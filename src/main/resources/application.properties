spring.application.name=todolist
server.port=8080

# --- Configuração do MySQL ---
# URL: Onde está o banco? (localhost, porta 3306, banco 'todolist')
spring.datasource.url=jdbc:mysql://localhost:3306/todolist

# O Usuário do MySQL (Geralmente é root)
spring.datasource.username=root

# A Senha do MySQL (A que usa no Workbench)
spring.datasource.password=162014

# Driver (Opcional nas versões novas, mas bom para garantir)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- O  Hibernate (JPA) ---
# update: Cria as tabelas sozinho se não existirem
spring.jpa.hibernate.ddl-auto=update

# show-sql: Mostra no log o SQL que o Spring está fazendo (para estudar)
spring.jpa.show-sql=true
